name: npm-publish

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Debug secret
        run: |
          if [ -z "$TOKEN" ]; then echo "SECRET IS EMPTY"; else echo "SECRET LENGTH=${#TOKEN}"; fi
        env:
          TOKEN: ${{ secrets.NPM_TOKEN_ENGRAM }}

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Publish to npm
        working-directory: mcp-server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_ENGRAM }}